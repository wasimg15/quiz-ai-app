services:
  - type: web
    name: quiz-ai-app-backend
    env: node
    buildCommand: npm install
    startCommand: node server/index.js
    envVars:
      - key: PORT
        value: 10000
      - key: CLIENT_URL
        value: https://quiz-ai-app.onrender.com

  - type: web
    name: quiz-ai-app
    env: node
    buildCommand: cd client && npm install && npm run build
    startCommand: cd client && npm install -g serve && serve -s build -l 10000
    envVars:
      - key: REACT_APP_BACKEND_URL
        value: https://quiz-ai-app-backend.onrender.com
